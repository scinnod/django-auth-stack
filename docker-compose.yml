# =============================================================================
# Django Auth Stack: nginx reverse proxy + Keycloak SSO
# =============================================================================
# Copyright (C) 2024-2026 David Kleinhans, Jade University of Applied Sciences
# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# This compose file defines the authentication gateway stack:
#   - nginx: public-facing reverse proxy (ports 80/443)
#   - keycloak: SSO/authentication server (OIDC & SAML support)
#   - oauth2-proxy: Forward auth middleware for nginx
#   - postgres: Keycloak database
#
# DYNAMIC SERVICE NETWORKS:
#   Configure services in .env using SERVICE_1_*, SERVICE_2_*, etc.
#   Run ./scripts/generate-compose-override.sh to create docker-compose.override.yml
#   with the required external networks.
#   Note: docker-compose.override.yml is automatically loaded by Docker Compose
#   when you run "docker compose up" - no need to specify it explicitly.
#
# NETWORKS (defense-in-depth segmentation):
#   - proxy: public-facing, nginx only (auto-created)
#   - auth_backend (internal): nginx <-> oauth2-proxy <-> keycloak
#   - keycloak_db (internal): keycloak <-> postgres
#   - <service>_backend (external): nginx <-> upstream containers (via override)
#
# TLS MODES:
#   Default: Use provided certificates (mount ./certs/)
#   Let's Encrypt: Use docker-compose.letsencrypt.yml override
#     docker compose -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL - Keycloak database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: edge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # Keycloak - SSO/authentication server (OIDC & SAML)
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-23.0}
    container_name: edge_keycloak
    restart: unless-stopped
    command: start
    environment:
      # Database (PostgreSQL recommended by Keycloak for production)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      
      # Admin user (initial setup only)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      
      # Hostname configuration (required for production)
      KC_HOSTNAME: ${DOMAIN_AUTH:-auth.example.org}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      
      # Proxy configuration (Keycloak is behind nginx reverse proxy)
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      
      # Security: Disable development features in production
      KC_FEATURES: "token-exchange,admin-fine-grained-authz"
      
      # Performance & Production settings
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: ${KEYCLOAK_LOG_LEVEL:-info}
      
      # Transaction settings (recommended for PostgreSQL)
      KC_TRANSACTION_XA_ENABLED: "false"
    volumes:
      # Realm configuration (optional - for config-as-code)
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    networks:
      - proxy           # External connectivity (needed for external IdP federation)
      - auth_backend
      - keycloak_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # OAuth2 Proxy - Forward auth middleware for nginx
  # ===========================================================================
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:${OAUTH2_PROXY_VERSION:-v7.6.0}
    container_name: edge_oauth2_proxy
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=static://202
      - --email-domain=*
      - --cookie-secure=true
      - --cookie-domain=${OAUTH2_PROXY_COOKIE_DOMAIN:-.example.org}
      - --whitelist-domain=${OAUTH2_PROXY_COOKIE_DOMAIN:-.example.org}
      # OIDC provider configuration for Keycloak
      - --provider=oidc
      - --provider-display-name=Keycloak
      # Request email and profile scopes
      - --scope=openid email profile
      # Use email claim for both User and Email fields (OIDC default behavior)
      # Note: Both session.User and session.Email will contain the email address
      # Django can extract username from email if needed (e.g., email.split('@')[0])
      - --oidc-email-claim=email
      - --oidc-groups-claim=groups
      # Internal URL for oauth2-proxy <-> Keycloak communication
      - --oidc-issuer-url=http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      - --redirect-url=https://${DOMAIN_AUTH:-auth.example.org}/oauth2/callback
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-user-headers=true
      - --pass-access-token=true
      - --pass-authorization-header=true
      - --set-authorization-header=true
      - --skip-provider-button=true
      # Development/Self-signed cert flags (remove for production with valid TLS):
      - --insecure-oidc-skip-issuer-verification=true
      - --ssl-insecure-skip-verify=true
      - --insecure-oidc-allow-unverified-email=true
      # Note: These flags allow oauth2-proxy to work with:
      #   - Self-signed certificates (common in dev/staging)
      #   - Internal Keycloak URL (http://keycloak:8080)
      #   - Unverified email addresses
      # For production with proper certificates, consider removing these.
      # Skip fetching claims from UserInfo endpoint - all claims should be in ID token
      - --skip-claims-from-profile-url=true
      # Use PKCE for enhanced security (recommended for Keycloak)
      - --code-challenge-method=S256
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:?OAUTH2_PROXY_CLIENT_ID must be set}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?OAUTH2_PROXY_CLIENT_SECRET must be set}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?OAUTH2_PROXY_COOKIE_SECRET must be set}
    networks:
      - auth_backend
    depends_on:
      keycloak:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # Nginx - Reverse proxy & TLS termination (PUBLIC ENTRYPOINT)
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: edge_nginx
    restart: unless-stopped
    # Custom entrypoint for environment variable substitution
    entrypoint: /docker-entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    environment:
      # Domain configuration (substituted in nginx configs at startup)
      DOMAIN_AUTH: ${DOMAIN_AUTH:-auth.example.org}
      # Keycloak realm for logout URL construction
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      # Cookie domain for clearing oauth2-proxy session on logout
      OAUTH2_PROXY_COOKIE_DOMAIN: ${OAUTH2_PROXY_COOKIE_DOMAIN:-.example.org}
      # OAuth2 client ID for Keycloak logout redirect
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      # Keycloak admin allowed IPs (space-separated list)
      KEYCLOAK_ADMIN_ALLOWED_IPS: ${KEYCLOAK_ADMIN_ALLOWED_IPS:-}
      # Service configuration (passed through for dynamic config generation)
      # Services are configured via SERVICE_1_*, SERVICE_2_*, etc. in .env
      SERVICE_1_NAME: ${SERVICE_1_NAME:-}
      SERVICE_1_ENABLED: ${SERVICE_1_ENABLED:-}
      SERVICE_1_PATTERN: ${SERVICE_1_PATTERN:-}
      SERVICE_1_DOMAIN: ${SERVICE_1_DOMAIN:-}
      SERVICE_1_UPSTREAM: ${SERVICE_1_UPSTREAM:-}
      SERVICE_1_NETWORK: ${SERVICE_1_NETWORK:-}
      SERVICE_2_NAME: ${SERVICE_2_NAME:-}
      SERVICE_2_ENABLED: ${SERVICE_2_ENABLED:-}
      SERVICE_2_PATTERN: ${SERVICE_2_PATTERN:-}
      SERVICE_2_DOMAIN: ${SERVICE_2_DOMAIN:-}
      SERVICE_2_UPSTREAM: ${SERVICE_2_UPSTREAM:-}
      SERVICE_2_NETWORK: ${SERVICE_2_NETWORK:-}
      SERVICE_3_NAME: ${SERVICE_3_NAME:-}
      SERVICE_3_ENABLED: ${SERVICE_3_ENABLED:-}
      SERVICE_3_PATTERN: ${SERVICE_3_PATTERN:-}
      SERVICE_3_DOMAIN: ${SERVICE_3_DOMAIN:-}
      SERVICE_3_UPSTREAM: ${SERVICE_3_UPSTREAM:-}
      SERVICE_3_NETWORK: ${SERVICE_3_NETWORK:-}
      SERVICE_4_NAME: ${SERVICE_4_NAME:-}
      SERVICE_4_ENABLED: ${SERVICE_4_ENABLED:-}
      SERVICE_4_PATTERN: ${SERVICE_4_PATTERN:-}
      SERVICE_4_DOMAIN: ${SERVICE_4_DOMAIN:-}
      SERVICE_4_UPSTREAM: ${SERVICE_4_UPSTREAM:-}
      SERVICE_4_NETWORK: ${SERVICE_4_NETWORK:-}
      SERVICE_5_NAME: ${SERVICE_5_NAME:-}
      SERVICE_5_ENABLED: ${SERVICE_5_ENABLED:-}
      SERVICE_5_PATTERN: ${SERVICE_5_PATTERN:-}
      SERVICE_5_DOMAIN: ${SERVICE_5_DOMAIN:-}
      SERVICE_5_UPSTREAM: ${SERVICE_5_UPSTREAM:-}
      SERVICE_5_NETWORK: ${SERVICE_5_NETWORK:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Custom entrypoint script
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      
      # Main nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      
      # Virtual host configuration TEMPLATES (processed by entrypoint)
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
      
      # TLS certificates
      # Mode A (default): Mount provided certs from ./certs/
      #   Place fullchain.pem and privkey.pem in ./certs/
      # Mode B (Let's Encrypt): Overridden by docker-compose.letsencrypt.yml
      #   Certbot volume mounted instead
      - ./certs:/etc/letsencrypt:ro
      
      # DH parameters for enhanced TLS security (required)
      # Generate: openssl dhparam -out ./certs/dhparam.pem 2048
      # Or run: ./scripts/init-selfsigned.sh (generates automatically)
      # Or run: ./scripts/preflight-check.sh --fix (generates if missing)
      - ./certs/dhparam.pem:/etc/nginx/dhparam.pem:ro
      
      # Logs
      - nginx_logs:/var/log/nginx
    networks:
      - proxy           # Public-facing
      - auth_backend    # -> oauth2-proxy & keycloak
      # Service networks are added via docker-compose.override.yml
      # Run: ./scripts/generate-compose-override.sh
    depends_on:
      - oauth2-proxy
      - keycloak
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

# =============================================================================
# Networks
# =============================================================================
networks:
  # Public-facing network (auto-created, only used by this stack)
  proxy:
    driver: bridge
  
  # Internal: nginx <-> oauth2-proxy <-> keycloak
  auth_backend:
    internal: true
    driver: bridge
  
  # Internal: keycloak <-> postgres
  keycloak_db:
    internal: true
    driver: bridge
  
  # External service networks are added via docker-compose.override.yml
  # Run: ./scripts/generate-compose-override.sh

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
