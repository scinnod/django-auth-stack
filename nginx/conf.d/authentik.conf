# =============================================================================
# Authentik SSO Portal - auth.example.org
# =============================================================================
# This virtual host exposes the Authentik UI/API for:
#   - User authentication (login/logout)
#   - Admin interface
#   - Forward-auth endpoints for nginx integration
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP -> HTTPS Redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name auth.jade.local;

    # Allow ACME challenge for Let's Encrypt (if using LE mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://auth.jade.local$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS - Authentik Portal
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.jade.local;

    # -------------------------------------------------------------------------
    # TLS Configuration
    # -------------------------------------------------------------------------
    # Certificates are mounted at /etc/letsencrypt/
    # - Provided mode: ./certs/ -> /etc/letsencrypt/
    # - Let's Encrypt mode: certbot volume -> /etc/letsencrypt/
    ssl_certificate /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    # HSTS: Force HTTPS for 1 year (WARNING: Cannot be easily undone!)
    # Only enable after confirming HTTPS works properly
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # CSP: Allow Authentik to function properly
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/auth.example.org.access.log main;
    error_log /var/log/nginx/auth.example.org.error.log warn;

    # -------------------------------------------------------------------------
    # Rate Limiting
    # -------------------------------------------------------------------------
    limit_req zone=auth burst=20 nodelay;

    # -------------------------------------------------------------------------
    # Proxy to Authentik Server
    # -------------------------------------------------------------------------
    location / {
        # Proxy to authentik-server over auth_backend network
        proxy_pass http://authentik-server:9000;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket support (needed for some Authentik features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Increase timeout for admin operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # Disable buffering for real-time features
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # Forward-Auth Endpoints (used by nginx auth_request)
    # -------------------------------------------------------------------------
    # These endpoints are called by nginx to validate authentication
    # See Authentik documentation for nginx outpost integration:
    # https://docs.goauthentik.io/docs/providers/proxy/forward_auth
    
    # Auth verification endpoint
    location /outpost.goauthentik.io {
        proxy_pass http://authentik-server:9000/outpost.goauthentik.io;
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Forward original request information
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        
        # Don't send body to auth endpoint
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        
        # Timeouts
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }
}
