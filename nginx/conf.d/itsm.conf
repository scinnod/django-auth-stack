# =============================================================================
# ITSM Application - itsm.example.org
# =============================================================================
# Access policy: MIXED (public + authenticated)
#   - Most paths are PUBLIC (no authentication required)
#   - Specific path prefixes require authentication:
#       * /admin/ and all subpaths
#       * /restricted/ and all subpaths
#       * /api/private/ and all subpaths
#
# For authenticated paths, forward user identity headers to upstream:
#   - X-Remote-User: username from Authentik
#   - X-Remote-Email: email from Authentik
#
# Upstream: itsm_nginx:8000 (external container on itsm_backend network)
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP -> HTTPS Redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name itsm.jade.local;

    # Allow ACME challenge for Let's Encrypt (if using LE mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://itsm.jade.local$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS - ITSM Application
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itsm.jade.local;

    # -------------------------------------------------------------------------
    # TLS Configuration
    # -------------------------------------------------------------------------
    # Certificates are mounted at /etc/letsencrypt/
    # - Provided mode: ./certs/ -> /etc/letsencrypt/
    # - Let's Encrypt mode: certbot volume -> /etc/letsencrypt/
    ssl_certificate /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    # HSTS: Force HTTPS for 1 year (WARNING: Cannot be easily undone!)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Logging (with authentication info)
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/itsm.example.org.access.log auth;
    error_log /var/log/nginx/itsm.example.org.error.log warn;

    # -------------------------------------------------------------------------
    # Rate Limiting
    # -------------------------------------------------------------------------
    limit_req zone=general burst=50 nodelay;

    # -------------------------------------------------------------------------
    # PROTECTED PATHS - Require Authentik Authentication
    # -------------------------------------------------------------------------
    # /admin/* - Administrative interface
    location /admin/ {
        # ------------------------
        # Authentik Forward Auth
        # ------------------------
        # Verify authentication via Authentik
        auth_request /auth-verify;
        
        # On auth failure, redirect to Authentik login
        error_page 401 = @error_auth_itsm;
        
        # Capture identity from Authentik response headers
        auth_request_set $auth_resp_x_authentik_username $upstream_http_x_authentik_username;
        auth_request_set $auth_resp_x_authentik_email $upstream_http_x_authentik_email;
        auth_request_set $auth_resp_set_cookie $upstream_http_set_cookie;
        
        # Forward authentication cookies
        add_header Set-Cookie $auth_resp_set_cookie;
        
        # ------------------------
        # Anti-Spoofing: Clear any client-provided identity headers
        # ------------------------
        # CRITICAL: Remove headers before proxying to prevent header injection
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Remote-Email "";
        
        # ------------------------
        # Forward verified identity to upstream
        # ------------------------
        proxy_set_header X-Remote-User $auth_user;
        proxy_set_header X-Remote-Email $auth_email;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Proxy to upstream ITSM app
        proxy_pass http://itsm_nginx:8000;
    }

    # /restricted/* - Restricted content area
    location /restricted/ {
        # Same authentication configuration as /admin/
        auth_request /auth-verify;
        error_page 401 = @error_auth_itsm;
        
        auth_request_set $auth_resp_x_authentik_username $upstream_http_x_authentik_username;
        auth_request_set $auth_resp_x_authentik_email $upstream_http_x_authentik_email;
        auth_request_set $auth_resp_set_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_resp_set_cookie;
        
        # Anti-spoofing + forward identity
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Remote-Email "";
        proxy_set_header X-Remote-User $auth_user;
        proxy_set_header X-Remote-Email $auth_email;
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_pass http://itsm_nginx:8000;
    }

    # /api/private/* - Private API endpoints
    location /api/private/ {
        # Same authentication configuration as /admin/
        auth_request /auth-verify;
        error_page 401 = @error_auth_itsm;
        
        auth_request_set $auth_resp_x_authentik_username $upstream_http_x_authentik_username;
        auth_request_set $auth_resp_x_authentik_email $upstream_http_x_authentik_email;
        auth_request_set $auth_resp_set_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_resp_set_cookie;
        
        # Anti-spoofing + forward identity
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Remote-Email "";
        proxy_set_header X-Remote-User $auth_user;
        proxy_set_header X-Remote-Email $auth_email;
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_pass http://itsm_nginx:8000;
    }

    # -------------------------------------------------------------------------
    # PUBLIC PATHS - No Authentication Required
    # -------------------------------------------------------------------------
    location / {
        # ------------------------
        # Anti-Spoofing: ALWAYS clear identity headers for public paths
        # ------------------------
        # CRITICAL: Prevent clients from injecting fake identity headers
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Remote-Email "";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Proxy to upstream ITSM app
        proxy_pass http://itsm_nginx:8000;
    }

    # -------------------------------------------------------------------------
    # Internal Location: Auth Verification Subrequest
    # -------------------------------------------------------------------------
    # This is called internally by auth_request directive
    # Contacts Authentik to verify authentication status
    location = /auth-verify {
        internal;
        
        # Call Authentik forward-auth endpoint
        proxy_pass http://authentik-server:9000/outpost.goauthentik.io/auth/nginx;
        
        # Forward original request information to Authentik
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Forward cookies for session validation
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        
        # Timeouts for auth check
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # Error Handler: Authentication Required
    # -------------------------------------------------------------------------
    location @error_auth_itsm {
        # Redirect to Authentik login with return URL
        return 302 https://auth.jade.local/outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
    }
}
